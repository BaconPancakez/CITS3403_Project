<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to UUUA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">

    <link href="{{ url_for('static', filename='css/admin.css') }}" rel="stylesheet">
</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <!-- SIDEBAR -->
            <aside class="col-12 col-md-4 col-lg-4 p-0 sidebar">
                <nav class="navbar navbar-expand-md navbar-light flex-md-column align-items-stretch h-100">

                    <div class="w-100 p-3 border-bottom">
                        <span class="navbar-brand">UUUA</span>
                    </div>

                    <!-- Mobile toggle -->
                    <button class="navbar-toggler mx-3 my-2" type="button" data-bs-toggle="collapse"
                        data-bs-target="#signinSidebarMenu" aria-controls="signinSidebarMenu" aria-expanded="false"
                        aria-label="Toggle sign in form">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div id="signinSidebarMenu" class="collapse navbar-collapse d-md-block w-100">
                        <div class="p-3 p-lg-4">
                            <h1 class="h3 mb-2">Sign in</h1>
                            <p class="text-muted mb-4">Use your UWA email to continue.</p>

                            {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                            {% for category, message in messages %}
                            <div class="alert alert-{{ category if category in ['success', 'danger', 'warning', 'info'] else 'secondary' }} mb-3"
                                role="alert">
                                {{ message }}
                            </div>
                            {% endfor %}
                            {% endif %}
                            {% endwith %}

                            <form class="auth-form" action="{{ url_for('login') }}" method="post">
                                <div class="mb-3">
                                    <label for="signin-email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="signin-email" name="email"
                                        placeholder="you@uwa.edu.au" autocomplete="email" data-uwa-email="true"
                                        pattern="^[^@\s]+@(student\.uwa\.edu\.au|uwa\.edu\.au)$" required>
                                </div>

                                <div class="mb-3">
                                    <label for="signin-password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="signin-password" name="password"
                                        autocomplete="current-password" required>
                                </div>

                                <button type="submit" class="btn btn-primary w-100">Sign In</button>
                            </form>

                            <p class="mt-4 mb-0 text-muted">
                                Don’t have an account?
                                <a href="{{ url_for('signup') }}">Sign up</a>
                            </p>
                        </div>
                    </div>

                    <div class="mt-auto w-100 p-3 border-top">
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary w-100">Back</a>
                    </div>

                </nav>
            </aside>

            <!-- MAIN -->
            <div class="col-12 col-md-8 col-lg-8 p-0">
