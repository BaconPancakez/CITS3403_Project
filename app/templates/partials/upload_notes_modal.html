<div
    class="modal fade"
    id="uploadNotesModal"
    tabindex="-1"
    aria-labelledby="uploadNotesModalLabel"
    aria-hidden="true"
>
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <form method="POST" enctype="multipart/form-data">
                <div class="modal-header">
                    <h5 class="modal-title" id="uploadNotesModalLabel">Upload notes</h5>
                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"
                    ></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="form_type" value="notes_upload">

                    <div class="mb-3">
                        <label class="form-label" for="notes-title">Title</label>
                        <input
                            class="form-control"
                            id="notes-title"
                            name="notes_title"
                            placeholder="Week 1 Notes"
                            required
                        />
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="notes-details">Details</label>
                        <textarea
                            class="form-control"
                            id="notes-details"
                            name="notes_details"
                            rows="3"
                            placeholder="Topics covered, format, or useful tips"
                        ></textarea>
                    </div>

                    <div class="mb-2">
                        <label class="form-label" for="notes-file">PDF file</label>
                        <input
                            class="form-control"
                            type="file"
                            id="notes-file"
                            name="notes_file"
                            accept="application/pdf"
                            required
                        />
                    </div>
                    <p class="small text-muted mb-0">Only PDF files are supported.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">Upload</button>
                </div>
            </form>
        </div>
    </div>
</div>
