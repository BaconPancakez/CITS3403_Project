<script src="{{ url_for('static', filename='js/style.js') }}"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".quiz-answer-form").forEach(function (form) {
        var url = form.getAttribute("data-answer-url");
        if (!url) return;

        var feedback = form.querySelector(".quiz-feedback");
        var radios = form.querySelectorAll('input[name="selected_index"]');

        form.addEventListener("submit", function (e) {
            e.preventDefault();
            if (!feedback) return;

            var checked = form.querySelector('input[name="selected_index"]:checked');
            if (!checked) {
                feedback.textContent = "Select an answer.";
                feedback.classList.remove("d-none", "text-success", "text-danger");
                feedback.classList.add("text-muted");
                return;
            }

            var selected = parseInt(checked.value, 10);
            fetch(url, {
                method: "POST",
                credentials: "same-origin",
                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json",
                },
                body: JSON.stringify({ selected_index: selected }),
            })
                .then(function (res) {
                    return res.json().then(function (data) {
                        return { ok: res.ok, data: data };
                    });
                })
                .then(function (result) {
                    feedback.classList.remove("d-none", "text-muted", "text-success", "text-danger");
                    if (!result.ok || !result.data.ok) {
                        feedback.textContent = "Could not check answer. Try again.";
                        feedback.classList.add("text-danger");
                        return;
                    }
                    if (result.data.correct) {
                        feedback.textContent = "Correct";
                        feedback.classList.add("text-success");
                    } else {
                        feedback.textContent = "Incorrect";
                        feedback.classList.add("text-danger");
                    }
                })
                .catch(function () {
                    feedback.classList.remove("d-none", "text-success", "text-muted");
                    feedback.classList.add("text-danger");
                    feedback.textContent = "Network error.";
                });
        });

        radios.forEach(function (r) {
            r.addEventListener("change", function () {
                if (!feedback) return;
                feedback.classList.add("d-none");
                feedback.textContent = "";
                feedback.classList.remove("text-success", "text-danger", "text-muted");
            });
        });
    });

    document.querySelectorAll(".quiz-upvote-btn").forEach(function (btn) {
        var url = btn.getAttribute("data-upvote-url");
        if (!url) return;

        function setUpvoteButtonState(upvoted) {
            btn.setAttribute("data-upvoted", upvoted ? "true" : "false");
            btn.setAttribute("aria-pressed", upvoted ? "true" : "false");
            btn.textContent = upvoted ? "Remove upvote" : "Upvote";
            btn.classList.toggle("btn-outline-secondary", !upvoted);
            btn.classList.toggle("btn-outline-danger", upvoted);
        }

        btn.addEventListener("click", function () {
            var hasUpvote = btn.getAttribute("data-upvoted") === "true";
            var body = hasUpvote ? { remove: true } : {};

            fetch(url, {
                method: "POST",
                credentials: "same-origin",
                headers: {
                    Accept: "application/json",
                    "Content-Type": "application/json",
                },
                body: JSON.stringify(body),
            })
                .then(function (res) {
                    return res.json().then(function (data) {
                        return { ok: res.ok, data: data };
                    });
                })
                .then(function (result) {
                    if (!result.ok || !result.data.ok) return;
                    var row = btn.closest(".quiz-item");
                    var countEl = row ? row.querySelector(".quiz-upvote-count") : null;
                    var labelEl = row ? row.querySelector(".quiz-upvote-label") : null;
                    if (countEl) countEl.textContent = String(result.data.count);
                    if (labelEl) {
                        labelEl.textContent =
                            result.data.count === 1 ? " upvote" : " upvotes";
                    }
                    setUpvoteButtonState(!!result.data.upvoted);
                })
                .catch(function () {});
        });
    });
});
</script>
