<div
    class="modal fade"
    id="notesPreviewModal"
    tabindex="-1"
    aria-labelledby="notesPreviewModalLabel"
    aria-hidden="true"
>
    <div class="modal-dialog modal-xl modal-dialog-centered notes-modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="notesPreviewModalLabel">Week 1 Notes</h5>
                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Close"
                ></button>
            </div>
            <div class="modal-body">
                <div class="notes-modal-frame border rounded">
                    <iframe
                        title="Notes preview"
                        src="{{ url_for('static', filename='ms.pdf') }}"
                    ></iframe>
                </div>
            </div>

            </div> -->
