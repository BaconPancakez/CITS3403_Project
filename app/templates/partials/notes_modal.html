<div class="modal fade" id="notesPreviewModal" tabindex="-1" aria-labelledby="notesPreviewModalLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered notes-modal-dialog">
        <div class="modal-content" style="height:90vh; display:flex; flex-direction:column;">

            <div class="modal-header py-2">
                <div class="flex-grow-1 me-3 min-width-0">
                    <h5 class="modal-title mb-0 text-truncate" id="notesPreviewModalLabel">Notes</h5>
                    <p class="text-muted small mb-0 mt-1" id="notesPreviewDetails" style="display:none;"></p>
                </div>
                <div class="d-flex align-items-center gap-2 flex-shrink-0">
                    <span class="badge bg-secondary text-uppercase" id="notesPreviewBadge"
                        style="font-size:0.65rem; display:none;"></span>
                    <a id="notesDownloadBtn" href="#" class="btn btn-sm btn-outline-primary">
                        ⬇ Download
                    </a>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
            </div>

            <div class="modal-body p-0" style="flex:1 1 auto; min-height:0;">
                <iframe title="Notes preview" id="notesPreviewFrame" src=""
                    style="width:100%; height:100%; border:0; display:block;"></iframe>
            </div>

        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/notes_modal.js') }}" defer></script>
