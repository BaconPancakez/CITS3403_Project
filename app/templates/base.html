<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet"
    />
    <link href="{{ url_for('static', filename='css/base.css') }}" rel="stylesheet" />
    {% block page_css %}{% endblock %}
    <title>{% block title %}Dashboard{% endblock %}</title>
</head>
<body class="{% block body_class %}{% endblock %}">
    <div class="app-shell{% if 'landing-page' in self.body_class() %} landing-shell{% endif %}">
        <aside class="sidebar{% if 'landing-page' in self.body_class() %} d-none{% endif %}">
            <!-- <div class="sidebar-brand">Admin</div> -->
            <nav class="sidebar-nav">
                <a class="nav-link{% if request.endpoint == 'index' %} active{% endif %}" href="{{ url_for('index') }}">Home</a>
                <a class="nav-link{% if request.endpoint in ['course_list', 'course_detail'] %} active{% endif %}" href="{{ url_for('course_list') }}">Courses</a>
                {% if not is_authenticated %}
                    <a class="nav-link{% if request.endpoint == 'login' %} active{% endif %}" href="{{ url_for('login') }}">Login</a>
                    <a class="nav-link{% if request.endpoint == 'signup' %} active{% endif %}" href="{{ url_for('signup') }}">Signup</a>
                {% endif %}
            </nav>
            <div class="sidebar-footer">
                {% if is_authenticated %}
                    <form method="post" action="{{ url_for('logout') }}">
                        <button class="btn btn-outline-secondary w-100" type="submit">Sign out</button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-secondary w-100" href="{{ url_for('login') }}">Sign in</a>
                {% endif %}
            </div>
        </aside>
        <div class="app-content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"
    ></script>
    {% block scripts %}{% endblock %}
</body>
</html>
