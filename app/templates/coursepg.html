{% extends "base.html" %}

{% block title %}{{ course.code }}{% endblock %}

{% block content %}
    <header class="hero-banner border-bottom">
        <div class="hero-overlay">
            <h1 class="hero-title m-0">{{ course.code }}</h1>
            <p class="hero-kicker mb-3 fs-5">{{ course.title }}</p>
        </div>
    </header>

    <main class="p-3 p-lg-4">
        <div class="row g-3">
            <div class="col-12 col-lg-8">
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Week 1 Notes</h5>
                        <p class="text-muted">Uploaded by User1</p>

                        <button class="btn btn-sm btn-outline-success">Upvote</button>
                        <button class="btn btn-sm btn-outline-danger">Downvote</button>
                        <button class="btn btn-sm btn-outline-warning">Report</button>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-4">
                <div class="card mb-3">
                    <div class="card-body">
                        <h6>Upload Notes</h6>
                        <input type="file" class="form-control mb-2" />
                        <button class="btn btn-primary w-100">Upload</button>
                    </div>
                </div>

                <div class="card mb-3">
                    <div class="card-body">
                        <h6>Reviews</h6>
                        <p>Four stars - Great course!</p>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <h6>Discussion</h6>
                        <p><strong>User1:</strong> Anyone understand Week 3?</p>
                        <input type="text" class="form-control" placeholder="Write a comment..." />
                    </div>
                </div>
            </div>
        </div>
    </main>
{% endblock %}
