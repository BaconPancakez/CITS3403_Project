{% extends "base.html" %}

{% block title %}Courses{% endblock %}

{% block content %}
    <header class="hero-banner border-bottom">
        <div class="hero-overlay">
            <h1 class="hero-title m-0">Courses</h1>
            <p class="hero-kicker mb-3 fs-5">Browse the courses you manage</p>
        </div>
    </header>

    <main class="p-3 p-lg-4">
        <div class="row g-3">
            {% for course in courses %}
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">{{ course.code }} {{ course.title }}</h5>
                            <p class="card-text">{{ course.summary }}</p>
                            <a href="{{ url_for('course_detail', course_code=course.code) }}" class="btn btn-primary">Open course</a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </main>
{% endblock %}
